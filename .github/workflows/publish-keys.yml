name: Auto Publish Keys

on:
  workflow_dispatch: {}
  schedule:
    - cron: '30 1 * * *'    # 北京 09:30
    - cron: '0 4 * * *'     # 北京 12:00
    - cron: '30 6 * * *'    # 北京 14:30
    - cron: '0 10 * * *'    # 北京 18:00
    - cron: '30 13 * * *'   # 北京 21:30

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - run: pip install requests

      - name: Publish keys
        env:
          KEY_MANAGER_URL: https://aiapiv2.pekpik.com/km/api
          KEY_MANAGER_TOKEN: ${{ secrets.KEY_MANAGER_TOKEN }}
        run: python scripts/publish_keys.py

      - name: Commit and push
        run: |
          git config user.name "FreeLLMShare Bot"
          git config user.email "bot@freellmshare.com"
          git add README.md README_CN.md
          git diff --cached --quiet && echo "No changes." && exit 0
          git commit -m "feat: auto-publish keys $(date -u +%Y-%m-%d-%H%M)"
          git push
